<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendamentos | Studio Guuki</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>Gestão de Agendamentos</h1></header>
  <main class="container">
    <h2>Agendar Novo Horário</h2>
    <form id="form-agendamento">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="datetime-local" id="data" required />
      <button type="submit">Agendar</button>
    </form>
    <hr/>
    <h2>Agendamentos Registrados</h2>
    <ul id="lista-agendamentos"></ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
