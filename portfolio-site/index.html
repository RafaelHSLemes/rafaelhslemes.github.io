
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RafaelHSLemes | Portifólio Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #111;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    section {
      padding: 2rem 1rem;
      max-width: 1000px;
      margin: auto;
    }
    h1, h2 {
      text-align: center;
    }
    .project {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      margin: 1rem 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .project a {
      text-decoration: none;
      color: #0066cc;
    }
    pre {
      background-color: #eee;
      padding: 1rem;
      overflow: auto;
    }
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>RafaelHSLemes | Desenvolvedor Web & Mobile</h1>
    <p>Transformo ideias em software. Simples, moderno e escalável.</p>
  </header>

  <section id="projects">
    <h2>Projetos em Destaque</h2>

    <div id="projetos-container"></div>
  </section>

  <section>
    <h2>Entre em Contato</h2>
    <p>📩 <a href="https://wa.me/5519995637347?text=Ol%C3%A1!%20Gostaria%20de%20fazer%20um%20or%C3%A7amento%20para%20meu%20projeto." target="_blank">Clique aqui para conversar comigo no WhatsApp</a></p>
    <p>💻 <a href="https://github.com/RafaelHSLemes" target="_blank">Visite meu GitHub</a></p>
  </section>

  <footer>
    <p>&copy; 2025 RafaelHSLemes | Portfólio hospedado via GitHub Pages</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const projetos = [
      { nome: 'Agendamento Online', pasta: '../agendamento-online/README.md' },
      { nome: 'Dashboard de Vendas', pasta: '../dashboard-vendas/README.md' },
      { nome: 'Landing Page para Infoprodutores', pasta: '../landing-infoprodutor/README.md' },
      { nome: 'Sistema de Gestão para Igrejas', pasta: '../igreja-gestao/README.md' }
    ];

    const container = document.getElementById('projetos-container');

    projetos.forEach(proj => {
      fetch(proj.pasta)
        .then(res => res.text())
        .then(md => {
          const div = document.createElement('div');
          div.classList.add('project');
          div.innerHTML = '<h3>' + proj.nome + '</h3>' + marked.parse(md);
          container.appendChild(div);
        })
        .catch(err => console.error(`Erro ao carregar ${proj.pasta}:`, err));
    });
  </script>
</body>
</html>
